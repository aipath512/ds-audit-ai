<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-AI™ — 99 Real Signals</title>
<script>document.documentElement.style.backgroundColor = '#ffffff';</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --bg2:#f5f5f7; --bg3:#e8e8ed;
  --text:#000000; --border:rgba(0,0,0,0.08);
  --blue:#0051a8; --green:#1a7f40; --gold:#7a4f00; --red:#c0392b;
}
html.dark {
  --bg:#000000; --bg2:#111111; --bg3:#1c1c1e;
  --text:#f5f5f7; --border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
.wrap{max-width:1200px;margin:0 auto;padding:20px;}
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:1px solid var(--border);}
.brand h1{font-family:'Playfair Display',serif;font-size:24px;}
.brand h1 em{color:var(--blue);font-style:italic;}
#toggle{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;}
#input-zone{text-align:center;padding:40px 0;}
.url-wrap{max-width:500px;margin:0 auto;position:relative;}
.url-in{width:100%;padding:16px 130px 16px 20px;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);}
.url-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:9px 22px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;}
#results{display:none;margin-top:30px;}
.signal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:20px;}
.signal-card{background:var(--bg2);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.signal-name{font-size:13px;font-weight:500;}
.signal-pass{color:var(--green);font-weight:600;}
.signal-fail{color:var(--red);font-weight:600;}
.score-circle{width:120px;height:120px;border-radius:60px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;font-weight:700;}
.rst{display:block;margin:40px auto;padding:12px 40px;background:transparent;border:1.5px solid var(--border);border-radius:100px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>Audit<em>·AI™</em></h1><p>99 REAL Signals</p></div>
    <button id="toggle" onclick="toggleTheme()"><span id="ti">☾</span><span id="tl">Dark</span></button>
  </header>

  <div id="input-zone">
    <h2 style="font-family:'Playfair Display';font-size:clamp(28px,4vw,44px);margin-bottom:16px;">Your AI Visibility,<br><em>Diagnosed.</em></h2>
    <div class="url-wrap">
      <input type="text" id="url-input" placeholder="example.com" autocomplete="off"/>
      <button class="url-go" onclick="startAudit()">Run Audit</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const WORKER_URL = 'https://audit-worker.aipath512.workers.dev';

function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

async function startAudit(){
  let raw = document.getElementById('url-input').value.trim();
  if(!raw) return;
  let clean = raw.replace(/^(https?:\/\/)?(www\.)?/i,'').split('/')[0];
  
  document.getElementById('input-zone').style.display = 'none';
  document.getElementById('results').innerHTML = '<div style="text-align:center;padding:40px;">🔍 Scanning 99 real signals...</div>';
  document.getElementById('results').style.display = 'block';
  
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: 'https://' + clean })
    });
    
    const data = await response.json();
    renderResults(data, clean);
  } catch(err) {
    document.getElementById('results').innerHTML = `<div style="color:red;text-align:center;">Error: ${err.message}</div>`;
  }
}

function renderResults(data, domain){
  const signals = data.signals || {};
  const scores = data.scores || {};
  const composite = data.composite || 0;
  
  let scoreColor = composite >= 80 ? 'var(--green)' : (composite >= 60 ? 'var(--gold)' : 'var(--red)');
  
  let signalHtml = '';
  for(const [name, info] of Object.entries(signals)){
    let statusClass = info.passed ? 'signal-pass' : 'signal-fail';
    let statusText = info.passed ? '✅ PASS' : '❌ FAIL';
    signalHtml += `
      <div class="signal-card">
        <span class="signal-name">${name.replace(/_/g, ' ')}</span>
        <span class="${statusClass}">${statusText}</span>
      </div>
    `;
  }
  
  document.getElementById('results').innerHTML = `
    <div style="text-align:center;margin-bottom:24px;">
      <div class="score-circle" style="background:${scoreColor};color:white">${composite}</div>
      <div style="font-size:20px;font-weight:600">${domain}</div>
      <div style="font-size:12px;opacity:0.6">${data.summary?.signals_passed || 0}/${data.summary?.signals_total || 0} signals passed</div>
    </div>
    
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;">
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AEO</strong><br><span style="font-size:24px;color:var(--blue)">${scores.AEO || 0}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>GEO</strong><br><span style="font-size:24px;color:var(--gold)">${scores.GEO || 0}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AIO</strong><br><span style="font-size:24px;color:var(--green)">${scores.AIO || 0}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>SEO</strong><br><span style="font-size:24px;color:var(--purple)">${scores.SEO || 0}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AI Signals</strong><br><span style="font-size:24px;color:var(--red)">${scores.AI_SIGNALS || 0}</span></div>
    </div>
    
    <div style="background:var(--bg2);border-radius:16px;padding:20px;">
      <h3 style="margin-bottom:16px;">📋 All 99 Signals (REAL checks)</h3>
      <div class="signal-grid">${signalHtml}</div>
    </div>
    
    <button class="rst" onclick="location.reload()">← New Audit</button>
  `;
}

document.getElementById('url-input').addEventListener('keypress', e => { if(e.key === 'Enter') startAudit(); });
</script>
</body>
</html>
