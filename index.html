*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;}
.wrap{max-width:1400px;margin:0 auto;padding:0 24px;}
header{padding:20px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.brand h1{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;}
.brand h1 em{font-style:italic;color:var(--blue);}
#toggle{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;font-size:11px;}
#bar{position:fixed;top:0;left:0;height:2px;background:var(--blue);width:0%;z-index:9999;}
#input-zone{padding:40px 0;text-align:center;}
.hero-h{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4vw,44px);margin-bottom:14px;}
.hero-h em{font-style:italic;color:var(--blue);}
.url-wrap{max-width:500px;margin:0 auto;position:relative;}
.url-in{width:100%;padding:16px 130px 16px 20px;font-size:15px;background:var(--bg);border:1.5px solid var(--border);border-radius:100px;outline:none;}
.url-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:9px 22px;background:var(--text);color:var(--bg);border:none;border-radius:100px;font-weight:600;cursor:pointer;}
#loading-zone{display:none;padding:40px 0;text-align:center;}
#results-zone{display:none;padding:32px 0;}
.glossary-link{font-size:12px;color:var(--blue);cursor:pointer;text-decoration:underline;margin-left:8px;}
.signals-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;}
.signals-table th,.signals-table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;}
.signals-table th{background:var(--bg2);font-weight:600;position:sticky;top:0;}
.status-pass{color:var(--green);font-weight:600;}
.status-warn{color:var(--gold);font-weight:600;}
.status-fail{color:var(--red);font-weight:600;}
.family-header{background:var(--bg3);font-weight:700;}
.family-row td{background:var(--bg2);font-weight:600;}
.category-card{background:var(--bg2);border-radius:16px;padding:20px;margin-bottom:24px;overflow-x:auto;}
.category-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.score-badge{padding:4px 12px;border-radius:100px;font-size:14px;font-weight:600;color:white;}
.rst{display:block;margin:40px auto;padding:12px 40px;background:transparent;border:1.5px solid var(--border);border-radius:100px;cursor:pointer;}

      { id: "ai18", name: "EU AI Act Compliance Tag", family: "ON-SITE", weight: 9, lvl: "L5" },
      { id: "ai19", name: "AI Governance Statement", family: "ON-SITE", weight: 8, lvl: "L4" },
      { id: "ai20", name: "allow-lane-matrix.json", family: "ON-SITE", weight: 8, lvl: "L5" },
      { id: "ai21", name: "Gemini Grounding Verified", family: "OFF-SITE", weight: 9, lvl: "L5" },
      { id: "ai22", name: "Perplexity Citation Score", family: "OFF-SITE", weight: 8, lvl: "L4" },
      { id: "ai23", name: "AI Knowledge Graph Entry", family: "OFF-SITE", weight: 9, lvl: "L5" },
      { id: "ai24", name: "LLM Embedding Proximity", family: "OFF-SITE", weight: 8, lvl: "L6" },
      { id: "ai25", name: "Vectorial Brand Representation", family: "OFF-SITE", weight: 7, lvl: "L6" },
      { id: "ai26", name: "AI Answer Layer Coverage", family: "OFF-SITE", weight: 9, lvl: "L5" },
      { id: "ai27", name: "intents.json Schema v1.1+", family: "ON-SITE", weight: 8, lvl: "L5" },
      { id: "ai28", name: "ai-proof.json Verification", family: "ON-SITE", weight: 8, lvl: "L5" },
      { id: "ai29", name: "entity-index SSOT", family: "ON-SITE", weight: 7, lvl: "L4" },
      { id: "ai30", name: "AI-Ready Score Declaration", family: "ON-SITE", weight: 7, lvl: "L4" },
      { id: "ai31", name: "Zero-Hallucination Anchors", family: "ON-SITE", weight: 8, lvl: "L6" },
      { id: "ai32", name: "Cross-AI Consistency Score", family: "OFF-SITE", weight: 9, lvl: "L6" }
    ]}
};

// Glossary terms
const GLOSSARY = {
  "AEO": "Answer Engine Optimization — structuring content so AI assistants extract and cite it as direct answers.",
  "GEO": "Generative Engine Optimization — making your brand entity discoverable and citable by LLM-based systems.",
  "AIO": "AI Optimization — signals that determine how AI systems understand and represent your content.",
  "SEO": "Search Engine Optimization — traditional search engine rankings signals.",
  "AI Signals": "Dedicated machine-readable files that declare your brand to AI crawlers.",
  "L1": "Level 1: Basic — Essential technical and content foundation.",
  "L2": "Level 2: Standard — Industry standard SEO and schema implementation.",
  "L3": "Level 3: Advanced — AI crawler permissions and structured data.",
  "L4": "Level 4: Proactive — Entity declaration and governance files.",
  "L5": "Level 5: Strategic — Proof, authority, and answer optimization.",
  "L6": "Level 6: Predictive — Cross-AI consistency and blockchain anchoring.",
  "llms.txt": "Plain-text governance file declaring entity data and permissions for LLMs.",
  "proof.json": "Cryptographic IP anchoring file with SHA-256 hashes.",
  "intents.json": "Declares user intents mapped to funnel stages for AI routing.",
  "entities.json": "Structured entity registry declaring brand, products, and relationships.",
  "governance.json": "Declares AI usage policy and EU AI Act compliance.",
  "knowledge-graph.json": "Machine-readable entity relationships for embedding proximity."
};

let currentSignalResults = {};

async function startAudit(){
  let raw = document.getElementById('url-input').value.trim();
  if(!raw) return;
  let clean = raw.replace(/^(https?:\/\/)?(www\.)?/i,'').split('/')[0];
  let url = 'https://' + clean;
  
  document.getElementById('input-zone').style.display = 'none';
  document.getElementById('loading-zone').style.display = 'block';
  document.getElementById('results-zone').innerHTML = '';
  document.getElementById('stream').innerHTML = '';
  document.getElementById('bar').style.width = '0%';
  
  await runAudit(url, clean);
}

async function runAudit(url, domain){
  const stream = document.getElementById('stream');
  function log(m){ const d=document.createElement('div'); d.textContent=m; stream.appendChild(d); stream.scrollTop=stream.scrollHeight; }
  
  log('📡 Calling Worker...');
  document.getElementById('bar').style.width = '20%';
  
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    });
    
    document.getElementById('bar').style.width = '60%';
    log('✅ Worker responded');
    
    const data = await response.json();
    log('📊 Processing 167 signals...');
    
    document.getElementById('bar').style.width = '100%';
    setTimeout(()=> document.getElementById('bar').style.width = '0%', 500);
    
    // Build signal results from worker data
    const details = data.details || {};
    buildSignalResults(details);
    renderResults(data, domain);
    
  } catch(err) {
    log('❌ Error: ' + err.message);
    document.getElementById('bar').style.width = '0%';
  }
}

function buildSignalResults(details){
  // Map worker detections to signal statuses
  // This simulates realistic scoring based on actual file detection
  currentSignalResults = {};
  
  // Helper: assign status based on detection
  const getStatus = (detected, weight) => {
    if(detected) return 'pass';
    if(weight >= 8) return 'fail';
    return 'warn';
  };
  
  // AEO signals
  SIGNALS.AEO.signals.forEach(sig => {
    let detected = false;
    if(sig.id === 'aeo1' || sig.id === 'aeo2') detected = details.intents_json_exists;
    if(sig.id === 'aeo11') detected = details.answer_layer_exists;
    if(sig.id === 'aeo4' || sig.id === 'aeo14') detected = details.answer_layer_exists;
    if(sig.id === 'aeo9' || sig.id === 'aeo10') detected = details.ai_json_has_sameAs > 0;
    if(sig.id === 'aeo27') detected = true; // semantic HTML assumed
    currentSignalResults[sig.id] = getStatus(detected, sig.weight);
  });
  
  // GEO signals
  SIGNALS.GEO.signals.forEach(sig => {
    let detected = false;
    if(sig.id === 'geo1') detected = details.llms_txt_exists;
    if(sig.id === 'geo3') detected = details.robots_txt_exists;
    if(sig.id === 'geo5') detected = details.ai_json_exists;
    if(sig.id === 'geo6') detected = details.ai_json_has_sameAs > 0;
    if(sig.id === 'geo8') detected = details.ai_json_exists;
    if(sig.id === 'geo9') detected = details.intents_json_exists;
    if(sig.id === 'geo11') detected = details.entities_json_exists;
    if(sig.id === 'geo25') detected = details.proof_json_exists;
    if(sig.id === 'geo23') detected = details.ai_json_exists;
    currentSignalResults[sig.id] = getStatus(detected, sig.weight);
  });
  
  // AIO signals
  SIGNALS.AIO.signals.forEach(sig => {
    let detected = false;
    if(sig.id === 'aio8') detected = details.robots_txt_exists;
    if(sig.id === 'aio14') detected = details.llms_txt_exists;
    if(sig.id === 'aio30') detected = details.ai_json_exists;
    if(sig.id === 'aio31') detected = details.governance_json_exists;
    currentSignalResults[sig.id] = getStatus(detected, sig.weight);
  });
  
  // SEO signals
  SIGNALS.SEO.signals.forEach(sig => {
    let detected = false;
    if(sig.id === 'seo1' || sig.id === 'seo2') detected = true;
    if(sig.id === 'seo9') detected = details.sitemap_exists;
    if(sig.id === 'seo12') detected = true;
    currentSignalResults[sig.id] = getStatus(detected, sig.weight);
  });
  
  // AI SIGNALS
  SIGNALS.AI_SIGNALS.signals.forEach(sig => {
    let detected = false;
    if(sig.id === 'ai1' || sig.id === 'ai2' || sig.id === 'ai3' || sig.id === 'ai4') detected = details.robots_txt_exists;
    if(sig.id === 'ai6' || sig.id === 'ai7') detected = details.proof_json_exists;
    if(sig.id === 'ai11') detected = details.policy_json_exists;
    if(sig.id === 'ai14') detected = details.entities_json_exists;
    if(sig.id === 'ai27') detected = details.intents_json_exists;
    currentSignalResults[sig.id] = getStatus(detected, sig.weight);
  });
}

function renderResults(data, domain){
  const zone = document.getElementById('results-zone');
  zone.style.display = 'block';
  document.getElementById('loading-zone').style.display = 'none';
  
  const scores = data.scores || {};
  const details = data.details || {};
  
  const getScoreColor = (score) => {
    if(score >= 80) return 'var(--green)';
    if(score >= 60) return 'var(--gold)';
    return 'var(--red)';
  };
  
  // Build full signals table
  let allSignalsHtml = '';
  
  for(const [catKey, catData] of Object.entries(SIGNALS)){
    let catScore = scores[catKey] || 0;
    let catColor = catData.color;
    let catBg = catData.bg;
    
    allSignalsHtml += `
      <div class="category-card" style="border-left:4px solid ${catColor}">
        <div class="category-title">
          ${catData.name} (${catData.signals.length} signals)
          <span class="score-badge" style="background:${getScoreColor(catScore)}">${catScore}/100</span>
        </div>
        <table class="signals-table">
          <thead>
            <tr><th>Signal</th><th>Family</th><th>Level</th><th>Weight</th><th>Status</th></tr>
          </thead>
          <tbody>
    `;
    
    for(const sig of catData.signals){
      let status = currentSignalResults[sig.id] || 'warn';
      let statusText = status === 'pass' ? '✅ PASS' : (status === 'warn' ? '⚠️ WARN' : '❌ FAIL');
      let statusClass = status === 'pass' ? 'status-pass' : (status === 'warn' ? 'status-warn' : 'status-fail');
      
      allSignalsHtml += `
        <tr>
          <td>${sig.name}</td>
          <td>${sig.family}</td>
          <td>${sig.lvl}</td>
          <td>${sig.weight}/10</td>
          <td class="${statusClass}">${statusText}</td>
        </tr>
      `;
    }
    
    allSignalsHtml += `</tbody></table></div>`;
  }
  
  // Build glossary
  let glossaryHtml = '<div class="category-card"><div class="category-title">📖 Glossary of Terms</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">';
  for(const [term, def] of Object.entries(GLOSSARY)){
    glossaryHtml += `<div style="background:var(--bg);border-radius:8px;padding:10px;"><strong>${term}</strong><br><span style="font-size:12px;opacity:0.8;">${def}</span></div>`;
  }
  glossaryHtml += '</div></div>';
  
  // Summary of missing files
  const files = [
    { name: 'llms.txt', exists: details.llms_txt_exists },
    { name: 'ai.json', exists: details.ai_json_exists },
    { name: 'entities.json', exists: details.entities_json_exists },
    { name: 'proof.json', exists: details.proof_json_exists },
    { name: 'intents.json', exists: details.intents_json_exists },
    { name: 'answer-layer.json', exists: details.answer_layer_exists },
    { name: 'authority.json', exists: details.authority_json_exists },
    { name: 'knowledge-graph.json', exists: details.knowledge_graph_exists },
    { name: 'governance.json', exists: details.governance_json_exists },
    { name: 'policy.json', exists: details.policy_json_exists }
  ];
  
  let missing = files.filter(f => !f.exists).map(f => f.name);
  let summaryClass = missing.length === 0 ? 'status-pass' : 'status-fail';
  
  zone.innerHTML = `
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:48px;font-weight:700;font-family:'Playfair Display'">${scores.COMPOSITE || 0}<span style="font-size:24px;">/100</span></div>
      <div style="font-size:14px;opacity:0.7">${domain}</div>
      <div style="font-size:12px;opacity:0.5">${new Date().toLocaleString()}</div>
      <div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:12px;display:inline-block;">
        <strong>Missing files:</strong> <span class="${summaryClass}">${missing.length === 0 ? '✅ None' : '❌ ' + missing.join(', ')}</span>
      </div>
    </div>
    
    ${allSignalsHtml}
    ${glossaryHtml}
    
    <button class="rst" onclick="resetAudit()">← New Audit</button>
  `;
}

function resetAudit(){
  document.getElementById('results-zone').style.display = 'none';
  document.getElementById('loading-zone').style.display = 'none';
  document.getElementById('input-zone').style.display = 'block';
  document.getElementById('url-input').value = '';
}

document.getElementById('url-input').addEventListener('keypress', e => { if(e.key === 'Enter') startAudit(); });
</script>
