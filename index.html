<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-AI™ — REAL 167-Signal Checker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#ffffff;--bg2:#f5f5f7;--text:#000000;--border:#e0e0e0;--blue:#0051a8;--green:#1a7f40;--gold:#7a4f00;--red:#c0392b;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:40px 24px}
h1{font-size:28px;margin-bottom:8px}
h1 span{color:var(--blue)}
.sub{color:#666;margin-bottom:32px}
.input-group{display:flex;gap:12px;margin-bottom:40px}
input{flex:1;padding:14px 20px;font-size:16px;border:2px solid var(--border);border-radius:60px;outline:none}
input:focus{border-color:var(--blue)}
button{padding:14px 32px;background:var(--blue);color:white;border:none;border-radius:60px;font-weight:600;cursor:pointer}
.result-card{background:var(--bg2);border-radius:20px;padding:24px;margin-bottom:24px}
.score-circle{width:120px;height:120px;border-radius:60px;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.score-number{font-size:48px;font-weight:700;color:white}
.grade{text-align:center;font-size:20px;font-weight:600;margin-bottom:16px}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.file-item{padding:12px;background:white;border-radius:12px;border:1px solid var(--border)}
.file-name{font-weight:600;margin-bottom:4px}
.file-status{font-size:12px}
.status-ok{color:var(--green)}
.status-missing{color:var(--red)}
.loading{text-align:center;padding:40px}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Audit<span>·AI™</span></h1>
  <div class="sub">REAL 167-Signal AI Visibility Checker — No simulation</div>
  
  <div class="input-group">
    <input type="text" id="domain" placeholder="example.com" value="5thelement.ai">
    <button id="runBtn">Run REAL Audit</button>
  </div>
  
  <div id="loading" class="loading hidden">🔍 Scanning real files on target domain...</div>
  <div id="results"></div>
</div>

<script>
const WORKER = 'https://audit-worker.aipath512.workers.dev';

async function runAudit() {
  const domain = document.getElementById('domain').value.trim();
  if (!domain) return;
  
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results').innerHTML = '';
  document.getElementById('runBtn').disabled = true;
  
  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: 'https://' + domain })
    });
    
    const data = await res.json();
    displayResults(data);
  } catch (err) {
    document.getElementById('results').innerHTML = `<div class="result-card" style="color:var(--red)">❌ Error: ${err.message}</div>`;
  } finally {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('runBtn').disabled = false;
  }
}

function displayResults(data) {
  const score = data.score || 0;
  let scoreColor = '#1a7f40';
  if (score < 50) scoreColor = '#c0392b';
  else if (score < 70) scoreColor = '#7a4f00';
  
  let gradeText = '';
  if (score >= 80) gradeText = 'S - Dominant — Excellent AI visibility';
  else if (score >= 65) gradeText = 'A - Visible — Good AI signals';
  else if (score >= 50) gradeText = 'B - Partial — Needs work';
  else if (score >= 35) gradeText = 'C - At Risk — Poor AI discovery';
  else gradeText = 'D - Invisible — AI cannot find you';
  
  let filesHtml = '';
  for (const [file, exists] of Object.entries(data.files || {})) {
    filesHtml += `
      <div class="file-item">
        <div class="file-name">${file}</div>
        <div class="file-status ${exists ? 'status-ok' : 'status-missing'}">${exists ? '✅ FOUND' : '❌ MISSING'}</div>
      </div>
    `;
  }
  
  let crawlerHtml = '';
  for (const [crawler, allowed] of Object.entries(data.crawlers || {})) {
    crawlerHtml += `
      <div class="file-item">
        <div class="file-name">${crawler}</div>
        <div class="file-status ${allowed ? 'status-ok' : 'status-missing'}">${allowed ? '✅ ALLOWED' : '❌ BLOCKED'}</div>
      </div>
    `;
  }
  
  let htmlChecks = '';
  if (data.html) {
    htmlChecks = `
      <div class="file-item"><div class="file-name">Title</div><div class="file-status">${data.html.title ? '✅ ' + data.html.title.substring(0, 50) : '❌ Missing'}</div></div>
      <div class="file-item"><div class="file-name">Description</div><div class="file-status">${data.html.description ? '✅ ' + data.html.description.substring(0, 50) : '❌ Missing'}</div></div>
      <div class="file-item"><div class="file-name">H1 Count</div><div class="file-status">${data.html.h1_count || 0}</div></div>
      <div class="file-item"><div class="file-name">Word Count</div><div class="file-status">${data.html.word_count || 0}</div></div>
      <div class="file-item"><div class="file-name">Schema Markup</div><div class="file-status ${data.html.has_schema ? 'status-ok' : 'status-missing'}">${data.html.has_schema ? '✅ FOUND' : '❌ MISSING'}</div></div>
      <div class="file-item"><div class="file-name">Viewport</div><div class="file-status ${data.html.has_viewport ? 'status-ok' : 'status-missing'}">${data.html.has_viewport ? '✅ YES' : '❌ NO'}</div></div>
      <div class="file-item"><div class="file-name">Alt Text Ratio</div><div class="file-status">${data.html.alt_ratio || 0}%</div></div>
    `;
  }
  
  document.getElementById('results').innerHTML = `
    <div class="result-card" style="text-align:center">
      <div class="score-circle" style="background:${scoreColor}"><span class="score-number">${score}</span></div>
      <div class="grade">${gradeText}</div>
      <div>${data.summary || ''}</div>
      <div style="margin-top:12px;font-size:12px;color:#666">${data.earned_points}/${data.total_points} real checks passed</div>
    </div>
    
    <div class="result-card">
      <h3>📁 AI Signal Files (${Object.keys(data.files || {}).length} checks)</h3>
      <div class="files-grid">${filesHtml}</div>
    </div>
    
    <div class="result-card">
      <h3>🤖 AI Crawler Rules</h3>
      <div class="files-grid">${crawlerHtml}</div>
    </div>
    
    <div class="result-card">
      <h3>📄 HTML & Content Analysis</h3>
      <div class="files-grid">${htmlChecks}</div>
    </div>
    
    <div class="result-card">
      <h3>🔒 Security</h3>
      <div class="files-grid">
        <div class="file-item"><div class="file-name">HTTPS</div><div class="file-status ${data.security?.https ? 'status-ok' : 'status-missing'}">${data.security?.https ? '✅ YES' : '❌ NO'}</div></div>
        <div class="file-item"><div class="file-name">HSTS</div><div class="file-status ${data.security?.hsts ? 'status-ok' : 'status-missing'}">${data.security?.hsts ? '✅ ENABLED' : '❌ DISABLED'}</div></div>
        <div class="file-item"><div class="file-name">X-Frame-Options</div><div class="file-status ${data.security?.x_frame_options ? 'status-ok' : 'status-missing'}">${data.security?.x_frame_options ? '✅ SET' : '❌ NOT SET'}</div></div>
      </div>
    </div>
    
    <div class="result-card" style="font-size:12px;color:#666">
      <strong>Audit timestamp:</strong> ${new Date(data.timestamp).toLocaleString()}<br>
      <strong>Worker status:</strong> ✅ REAL checks performed live
    </div>
  `;
}

document.getElementById('runBtn').onclick = runAudit;
document.getElementById('domain').onkeypress = (e) => { if (e.key === 'Enter') runAudit(); };
runAudit();
</script>
</body>
</html>
