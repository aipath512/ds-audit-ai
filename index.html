<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-AI™ — REAL Signal Checker</title>
<script>
  document.documentElement.style.backgroundColor = '#ffffff';
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --bg2:#f5f5f7; --bg3:#e8e8ed;
  --text:#000000; --border:rgba(0,0,0,0.08);
  --blue:#0051a8; --blue-bg:#e8f0fb;
  --red:#c0392b; --red-bg:#fdecea;
  --green:#1a7f40; --green-bg:#e6f5ed;
  --gold:#7a4f00; --gold-bg:#fff3cd;
}
html.dark {
  --bg:#000000; --bg2:#111111; --bg3:#1c1c1e;
  --text:#f5f5f7; --border:rgba(255,255,255,0.08);
  --blue:#5eb4ff; --blue-bg:#0a1829;
  --red:#ff6b6b; --red-bg:#1a0808;
  --green:#32d74b; --green-bg:#061509;
  --gold:#ffd60a; --gold-bg:#1a1200;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;line-height:1.5;}
.wrap{max-width:1100px;margin:0 auto;padding:0 32px;}
header{padding:24px 0 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.brand h1{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;}
.brand h1 em{font-style:italic;color:var(--blue);}
#toggle{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;font-size:11px;}
#bar{position:fixed;top:0;left:0;height:2px;background:var(--blue);width:0%;z-index:9999;}
#input-zone{padding:48px 0;text-align:center;}
.hero-h{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(32px,5vw,52px);margin-bottom:14px;}
.hero-h em{font-style:italic;color:var(--blue);}
.url-wrap{max-width:560px;margin:0 auto;position:relative;}
.url-in{width:100%;padding:18px 140px 18px 22px;font-size:15px;background:var(--bg);border:1.5px solid var(--border);border-radius:100px;outline:none;}
.url-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:10px 24px;background:var(--text);color:var(--bg);border:none;border-radius:100px;font-weight:600;cursor:pointer;}
#loading-zone{display:none;padding:60px 0;text-align:center;}
#results-zone{display:none;padding:48px 0;}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:48px;font-weight:700;font-family:'Playfair Display',serif;}
.file-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:20px 0;}
.file-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.file-name{font-weight:600;font-size:14px;}
.file-status{font-size:13px;font-weight:500;}
.status-found{color:var(--green);}
.status-missing{color:var(--red);}
.category-card{background:var(--bg2);border-radius:16px;padding:20px;margin-bottom:20px;}
.category-title{font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.score-badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:14px;font-weight:600;margin-left:12px;}
.rst{display:block;margin:40px auto;padding:12px 40px;background:transparent;border:1.5px solid var(--border);border-radius:100px;cursor:pointer;}
</style>
</head>
<body>
<div id="bar"></div>
<div class="wrap">
  <header>
    <div class="brand"><h1>Audit<em>·AI™</em></h1><p>REAL Signal Checker · 167 Signals</p></div>
    <button id="toggle" onclick="toggleTheme()"><span id="ti">☾</span><span id="tl">Dark</span></button>
  </header>

  <div id="input-zone">
    <h2 class="hero-h">Your AI Search Visibility,<br><em>Diagnosed.</em></h2>
    <div class="url-wrap">
      <input type="text" id="url-input" class="url-in" placeholder="example.com" autocomplete="off"/>
      <button class="url-go" onclick="startAudit()">Run REAL Audit</button>
    </div>
  </div>

  <div id="loading-zone">
    <div style="font-size:20px;margin-bottom:16px;">🔍 Scanning REAL files...</div>
    <div id="stream" style="background:var(--bg2);border-radius:12px;padding:16px;text-align:left;font-family:monospace;font-size:12px;height:200px;overflow-y:auto;"></div>
  </div>

  <div id="results-zone"></div>
</div>

<script>
const WORKER_URL = 'https://audit-worker.aipath512.workers.dev';

function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

async function startAudit(){
  let raw = document.getElementById('url-input').value.trim();
  if(!raw) return;
  let clean = raw.replace(/^(https?:\/\/)?(www\.)?/i,'').split('/')[0];
  let url = 'https://' + clean;
  
  document.getElementById('input-zone').style.display = 'none';
  document.getElementById('loading-zone').style.display = 'block';
  document.getElementById('results-zone').innerHTML = '';
  document.getElementById('results-zone').style.display = 'none';
  document.getElementById('stream').innerHTML = '';
  document.getElementById('bar').style.width = '0%';
  
  await runAudit(url, clean);
}

async function runAudit(url, domain){
  const stream = document.getElementById('stream');
  function log(m){ const d=document.createElement('div'); d.textContent=m; stream.appendChild(d); stream.scrollTop=stream.scrollHeight; }
  
  log('📡 Calling Worker...');
  document.getElementById('bar').style.width = '20%';
  
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    });
    
    document.getElementById('bar').style.width = '60%';
    log('✅ Worker responded');
    
    const data = await response.json();
    log('📊 Processing results...');
    
    document.getElementById('bar').style.width = '100%';
    setTimeout(()=> document.getElementById('bar').style.width = '0%', 500);
    
    renderResults(data, domain);
    
  } catch(err) {
    log('❌ Error: ' + err.message);
    document.getElementById('bar').style.width = '0%';
  }
}

function renderResults(data, domain){
  const zone = document.getElementById('results-zone');
  zone.style.display = 'block';
  document.getElementById('loading-zone').style.display = 'none';
  
  const scores = data.scores || {};
  const details = data.details || {};
  
  // Get color for score
  const getScoreColor = (score) => {
    if(score >= 80) return 'var(--green)';
    if(score >= 60) return 'var(--gold)';
    return 'var(--red)';
  };
  
  // Build file list HTML
  const files = [
    { name: 'llms.txt', exists: details.llms_txt_exists, category: 'GEO, AI Signals' },
    { name: 'ai.json', exists: details.ai_json_exists, category: 'GEO, AI Signals' },
    { name: 'entities.json', exists: details.entities_json_exists, category: 'GEO, AI Signals' },
    { name: 'proof.json', exists: details.proof_json_exists, category: 'GEO, AI Signals' },
    { name: 'intents.json', exists: details.intents_json_exists, category: 'AEO' },
    { name: 'answer-layer.json', exists: details.answer_layer_exists, category: 'AEO' },
    { name: 'authority.json', exists: details.authority_json_exists, category: 'GEO' },
    { name: 'knowledge-graph.json', exists: details.knowledge_graph_exists, category: 'AIO' },
    { name: 'governance.json', exists: details.governance_json_exists, category: 'AIO' },
    { name: 'policy.json', exists: details.policy_json_exists, category: 'AIO' },
    { name: 'robots.txt', exists: details.robots_txt_exists, category: 'SEO, AIO' },
    { name: 'sameAs links', exists: details.ai_json_has_sameAs > 0, category: 'GEO' }
  ];
  
  let filesHtml = '';
  for(const file of files){
    filesHtml += `
      <div class="file-item">
        <span class="file-name">📄 ${file.name}</span>
        <span class="file-status ${file.exists ? 'status-found' : 'status-missing'}">
          ${file.exists ? '✅ FOUND' : '❌ MISSING'}
        </span>
      </div>
    `;
  }
  
  // Build missing files summary
  let missingFiles = files.filter(f => !f.exists).map(f => f.name);
  let missingText = missingFiles.length === 0 ? '✅ All files present!' : `❌ Missing: ${missingFiles.join(', ')}`;
  
  // Build recommendations
  let recommendations = [];
  if(!details.intents_json_exists) recommendations.push('Create /intents.json with your Q&A pairs');
  if(!details.answer_layer_exists) recommendations.push('Create /answer-layer.json with canonical answers');
  if(!details.authority_json_exists) recommendations.push('Create /authority.json declaring your authority');
  if(!details.knowledge_graph_exists) recommendations.push('Create /knowledge-graph.json with entity relationships');
  if(!details.governance_json_exists) recommendations.push('Create /governance.json with AI crawler policy');
  if(!details.policy_json_exists) recommendations.push('Create /policy.json with AI usage policy');
  if(!details.ai_json_has_sameAs) recommendations.push('Add sameAs links to your ai.json (LinkedIn, Crunchbase, Wikidata)');
  
  let recommendationsHtml = '';
  if(recommendations.length > 0){
    recommendationsHtml = `<div class="category-card" style="background:var(--red-bg)"><div class="category-title">🔧 WHAT TO FIX</div><ul style="margin-left:20px;line-height:1.8">${recommendations.map(r => `<li>${r}</li>`).join('')}</ul></div>`;
  } else {
    recommendationsHtml = `<div class="category-card" style="background:var(--green-bg)"><div class="category-title">✅ PERFECT SCORE</div><div>All AI signal files are present. Your site is AI-ready!</div></div>`;
  }
  
  zone.innerHTML = `
    <div style="text-align:center;margin-bottom:32px;">
      <div class="score-circle" style="background:${getScoreColor(scores.COMPOSITE)};color:white">${scores.COMPOSITE || 0}</div>
      <div style="font-size:14px;color:var(--text);opacity:0.7">${domain}</div>
      <div style="font-size:12px;color:var(--text);opacity:0.5">${new Date().toLocaleString()}</div>
    </div>
    
    <div class="category-card">
      <div class="category-title">📁 FILES CHECKED (REAL FETCH)</div>
      <div class="file-list">${filesHtml}</div>
      <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:12px;font-size:13px">
        <strong>Summary:</strong> ${missingText}
      </div>
    </div>
    
    <div class="category-card">
      <div class="category-title">
        📊 CATEGORY SCORES
        <span class="score-badge" style="background:${getScoreColor(scores.AEO)};color:white">AEO: ${scores.AEO || 0}</span>
        <span class="score-badge" style="background:${getScoreColor(scores.GEO)};color:white">GEO: ${scores.GEO || 0}</span>
        <span class="score-badge" style="background:${getScoreColor(scores.AIO)};color:white">AIO: ${scores.AIO || 0}</span>
        <span class="score-badge" style="background:${getScoreColor(scores.SEO)};color:white">SEO: ${scores.SEO || 0}</span>
        <span class="score-badge" style="background:${getScoreColor(scores.AI_SIGNALS)};color:white">AI Signals: ${scores.AI_SIGNALS || 0}</span>
      </div>
      <div style="margin-top:12px;font-size:13px;line-height:1.8">
        <div><strong>AEO (${scores.AEO || 0}/100)</strong> - ${details.intents_json_exists ? '✓ intents.json found with ' + (details.intents_has_primary || 0) + ' intents' : '✗ intents.json missing'} ${details.answer_layer_exists ? ' ✓ answer-layer.json found' : ' ✗ answer-layer.json missing'}</div>
        <div><strong>GEO (${scores.GEO || 0}/100)</strong> - ${details.llms_txt_exists ? '✓ llms.txt' : '✗ llms.txt'} ${details.ai_json_exists ? '✓ ai.json' : '✗ ai.json'} ${details.entities_json_exists ? '✓ entities.json' : '✗ entities.json'} ${details.proof_json_exists ? '✓ proof.json' : '✗ proof.json'} ${details.authority_json_exists ? '✓ authority.json' : '✗ authority.json'}</div>
        <div><strong>AIO (${scores.AIO || 0}/100)</strong> - ${details.governance_json_exists ? '✓ governance.json' : '✗ governance.json'} ${details.policy_json_exists ? '✓ policy.json' : '✗ policy.json'} ${details.knowledge_graph_exists ? '✓ knowledge-graph.json' : '✗ knowledge-graph.json'}</div>
        <div><strong>AI Signals (${scores.AI_SIGNALS || 0}/100)</strong> - ${details.llms_txt_exists ? '✓ llms.txt' : '✗ llms.txt'} ${details.ai_json_exists ? '✓ ai.json' : '✗ ai.json'} ${details.intents_json_exists ? '✓ intents.json' : '✗ intents.json'}</div>
      </div>
    </div>
    
    ${recommendationsHtml}
    
    <button class="rst" onclick="resetAudit()">← New Audit</button>
  `;
}

function resetAudit(){
  document.getElementById('results-zone').style.display = 'none';
  document.getElementById('loading-zone').style.display = 'none';
  document.getElementById('input-zone').style.display = 'block';
  document.getElementById('url-input').value = '';
}

document.getElementById('url-input').addEventListener('keypress', e => { if(e.key === 'Enter') startAudit(); });
</script>
</body>
</html>
