<!DOCTYPE html>
<html>
<head>
<title>AUDIT-AI - Real Claude API</title>
<style>
body{font-family:sans-serif;max-width:800px;margin:50px auto;padding:20px}
input{padding:12px;width:70%;font-size:16px}
button{padding:12px 24px;font-size:16px;margin-left:10px}
pre{background:#f0f0f0;padding:20px;overflow:auto;white-space:pre-wrap}
.loading{color:blue}
.error{color:red}
.success{color:green}
</style>
</head>
<body>
<h1>AUDIT-AI™ Real Claude API</h1>
<p>Enter any website URL to analyze AI visibility</p>
<input type="text" id="url" placeholder="example.com">
<button onclick="runAudit()">Run Audit</button>
<pre id="results">Results will appear here...</pre>

<script>
async function runAudit() {
  const url = document.getElementById('url').value;
  if(!url) {
    alert('Enter a URL');
    return;
  }
  
  document.getElementById('results').innerHTML = '<span class="loading">🔄 Analyzing ' + url + ' with Claude API...</span>';
  
  const API_KEY = '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';
  
  const requestBody = {
    model: 'claude-3-haiku-20240307',
    max_tokens: 1000,
    messages: [{ 
      role: 'user', 
      content: `You are an AI visibility auditor. Analyze ${url} and return ONLY valid JSON with NO extra text. Format:
{
  "scores": {
    "AEO": (number 0-100),
    "GEO": (number 0-100), 
    "AIO": (number 0-100),
    "SEO": (number 0-100),
    "AI_SIGNALS": (number 0-100)
  },
  "composite": (number 0-100),
  "synthesis": "one sentence summary",
  "action_plan": ["action 1", "action 2", "action 3"]
}`
    }]
  };
  
  try {
    // Using CORS proxy to bypass browser blocking
    const proxyUrl = 'https://corsproxy.io/?';
    const targetUrl = 'https://api.anthropic.com/v1/messages';
    
    const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
      method: 'POST',
      headers: {
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json'
      },
      body: JSON.stringify(requestBody)
    });
    
    const data = await response.json();
    
    if(data.content && data.content[0]) {
      let text = data.content[0].text;
      text = text.replace(/```json/g, '').replace(/```/g, '').trim();
      const result = JSON.parse(text);
      document.getElementById('results').innerHTML = '<span class="success">✅ RESULTS FOR ' + url + '</span>\n\n' + JSON.stringify(result, null, 2);
    } else if(data.error) {
      document.getElementById('results').innerHTML = '<span class="error">❌ API Error: ' + JSON.stringify(data.error) + '</span>';
    } else {
      document.getElementById('results').innerHTML = '<span class="error">❌ Unexpected response: ' + JSON.stringify(data).substring(0, 500) + '</span>';
    }
    
  } catch(err) {
    document.getElementById('results').innerHTML = '<span class="error">❌ Error: ' + err.message + '</span>';
  }
}
</script>
</body>
</html>
