<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-AI™ — 167-Signal AI Visibility Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --bg2:#f5f5f7; --bg3:#e8e8ed;
  --text:#000000; --border:rgba(0,0,0,0.08);
  --blue:#0051a8; --green:#1a7f40; --gold:#7a4f00; --red:#c0392b;
}
html.dark {
  --bg:#000000; --bg2:#111111; --bg3:#1c1c1e;
  --text:#f5f5f7; --border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;}
.wrap{max-width:1400px;margin:0 auto;padding:20px;}
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;}
.brand h1{font-family:'Playfair Display',serif;font-size:24px;}
.brand h1 em{color:var(--blue);font-style:italic;}
#toggle{padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;font-size:12px;}
#input-zone{text-align:center;padding:40px 0;}
.url-wrap{max-width:500px;margin:0 auto;position:relative;}
.url-in{width:100%;padding:16px 130px 16px 20px;border:1.5px solid var(--border);border-radius:100px;background:var(--bg);font-size:16px;}
.url-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:9px 22px;background:var(--text);color:var(--bg);border:none;border-radius:100px;cursor:pointer;font-weight:600;}
#results{display:none;margin-top:30px;}
.category-card{background:var(--bg2);border-radius:16px;padding:20px;margin-bottom:24px;}
.category-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.score-badge{padding:4px 12px;border-radius:100px;font-size:14px;color:white;}
.signals-table{width:100%;border-collapse:collapse;font-size:12px;}
.signals-table th,.signals-table td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);}
.status-pass{color:var(--green);font-weight:600;}
.status-warn{color:var(--gold);font-weight:600;}
.status-fail{color:var(--red);font-weight:600;}
.rst{display:block;margin:40px auto;padding:12px 40px;background:transparent;border:1.5px solid var(--border);border-radius:100px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>Audit<em>·AI™</em></h1><p>167-Signal AI Visibility Engine</p></div>
    <button id="toggle" onclick="toggleTheme()"><span id="ti">☾</span><span id="tl">Dark</span></button>
  </header>

  <div id="input-zone">
    <h2 style="font-family:'Playfair Display';font-size:clamp(28px,4vw,44px);margin-bottom:16px;">Your AI Search Visibility,<br><em>Diagnosed.</em></h2>
    <div class="url-wrap">
      <input type="text" id="url-input" placeholder="example.com" autocomplete="off"/>
      <button class="url-go" onclick="startAudit()">Run 167-Signal Audit</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
// 167 SIGNALS DATABASE
const SIGNALS = {
  AEO: { name: "Answer Engine Optimization", color: "#0051a8", signals: [
    "FAQ Schema Markup", "HowTo Schema Markup", "Q&A Format Content", "Structured Answer Snippets",
    "Speakable Schema", "Article Schema", "Breadcrumb Schema", "Table of Contents",
    "Entity Disambiguation", "Knowledge Panel", "Direct Answer Formatting", "Question-Intent URLs",
    "PAA Coverage", "Featured Snippet Optimization", "Definition Blocks", "Step-by-Step Schema",
    "Concise Lead Paragraphs", "Voice Search Optimization", "Answer-First Structure", "NLP-Friendly Headings",
    "Conversational Query Coverage", "Schema Nesting Depth", "Rich Snippet Eligibility", "Google SGE Optimization",
    "Context Carryover", "Entity Salience", "Semantic HTML5", "ClaimReview Schema",
    "Event Schema", "Product Schema", "Local Business Schema", "Review Schema",
    "Video Schema", "Person/Author Schema"
  ]},
  GEO: { name: "Generative Engine Optimization", color: "#7a4f00", signals: [
    "llms.txt", "ai.txt", "robots.txt AI Rules", "Entity Graph JSON-LD", "Organization Schema",
    "sameAs Links", "Wikipedia/Wikidata Entry", "ai.json", "intents.json", "governance.json",
    "entities.json", "Crunchbase Profile", "LinkedIn Verification", "Press Mentions", "Author EEAT",
    "Brand Entity Consistency", "Canonical URLs", "Hreflang Tags", "Local Citations", "Google Business Profile",
    "Named Entity Density", "Geo-Tagged Content", "OpenGraph Tags", "Twitter Cards",
    "proof.json", "changelog.json", "Dataset Schema", "External Entity Links"
  ]},
  AIO: { name: "AI Optimization", color: "#1a7f40", signals: [
    "Topical Authority", "Semantic Keywords", "Content Freshness", "E-E-A-T Score", "Expertise Signals",
    "Fact Density", "Source Citations", "AI Crawl Permissions", "LLM Indexability", "Perplexity Citations",
    "ChatGPT Visibility", "Gemini Grounding", "Claude Indexing", "Corpus Inclusion", "Proprietary Data",
    "Definition Ownership", "Thought Leadership", "Long-Form Content", "Internal Link Map", "Concept Clusters",
    "Contrastive Analysis", "RAG-Ready Format", "Dense Summaries", "Table/List Extraction", "Versioning",
    "AI Summary Blocks", "Token-Efficient Headings", "Inference Keywords", "Contradiction Avoidance",
    "LLM-Readable Metadata", "Allow-Lane Matrix"
  ]},
  SEO: { name: "Search Engine Optimization", color: "#5e2ca5", signals: [
    "Title Tag", "Meta Description", "H1-H6 Hierarchy", "Keyword Density", "LSI Keywords",
    "URL Structure", "Image Alt Tags", "Internal Links", "XML Sitemap", "Core Web Vitals",
    "Mobile Responsiveness", "HTTPS/SSL", "Backlink Authority", "Backlink Diversity", "Referring Domains",
    "Anchor Text", "Brand Mentions", "Duplicate Content", "Canonical Tags", "Structured Data",
    "Crawl Budget", "404 Handling", "Redirect Chains", "Content Length", "Outbound Links",
    "Social Signals", "Bounce Rate", "Dwell Time", "CTR", "Search Console",
    "Index Coverage", "LCP", "CLS", "INP", "HTTPS Redirects",
    "Hreflang", "Pagination", "Schema Errors", "Toxic Backlinks", "Domain Age",
    "Content Freshness", "Header Flow"
  ]},
  AI_SIGNALS: { name: "AI Signals (Trust Layer)", color: "#c0392b", signals: [
    "ClaudeBot Allow", "GPTBot Allow", "Google-Extended", "PerplexityBot Allow", "CCBot Allow",
    "proof.json", "Cryptographic IP Proof", "IPFS Registration", "session.json", "aliases.json",
    "policy.json", "actions.json", "Hallucination Prevention", "Entity Graph", "AI-Readable Content",
    "Confidentiality Tags", "Training Consent", "EU AI Act Compliance", "Governance Statement", "allow-lane-matrix",
    "Gemini Grounding", "Perplexity Citations", "AI Knowledge Graph", "LLM Embedding", "Vector Brand",
    "Answer Layer Coverage", "intents.json v1.1", "ai-proof.json", "entity-index", "AI-Ready Score",
    "Zero-Hallucination Anchors", "Cross-AI Consistency"
  ]}
};

function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

async function startAudit(){
  let domain = document.getElementById('url-input').value.trim();
  if(!domain) return;
  domain = domain.replace(/^(https?:\/\/)?(www\.)?/i,'').split('/')[0];
  
  document.getElementById('input-zone').style.display = 'none';
  document.getElementById('results').innerHTML = '<div style="text-align:center;padding:40px;">🔍 Analyzing 167 signals for ' + domain + '...</div>';
  document.getElementById('results').style.display = 'block';
  
  // Simulate realistic scoring based on domain pattern
  setTimeout(() => {
    const isAISite = /ai|gpt|llm|neural|deep|machine|cogni|intel/i.test(domain);
    const isTechSite = /tech|digital|dev|code|soft|data|cloud|cyber/i.test(domain);
    const isBigTech = /google|microsoft|amazon|apple|meta|salesforce/i.test(domain);
    
    let baseScore = 35;
    if(isBigTech) baseScore = 88;
    else if(isAISite) baseScore = 78;
    else if(isTechSite) baseScore = 62;
    
    const scores = {
      AEO: Math.min(98, baseScore + Math.floor(Math.random() * 15)),
      GEO: Math.min(98, baseScore + Math.floor(Math.random() * 12)),
      AIO: Math.min(98, baseScore + Math.floor(Math.random() * 18)),
      SEO: Math.min(98, baseScore + Math.floor(Math.random() * 10)),
      AI_SIGNALS: Math.min(98, baseScore + Math.floor(Math.random() * 20))
    };
    
    const composite = Math.round((scores.AEO + scores.GEO + scores.AIO + scores.SEO + scores.AI_SIGNALS) / 5);
    
    renderResults(domain, scores, composite);
  }, 1500);
}

function renderResults(domain, scores, composite){
  let compositeColor = composite >= 80 ? '#1a7f40' : (composite >= 60 ? '#7a4f00' : '#c0392b');
  let grade = composite >= 80 ? 'S — Dominant' : (composite >= 65 ? 'A — Visible' : (composite >= 50 ? 'B — Partial' : (composite >= 35 ? 'C — At Risk' : 'D — Invisible')));
  
  let allSignalsHtml = '';
  
  for(const [catKey, catData] of Object.entries(SIGNALS)){
    let catScore = scores[catKey] || 0;
    let catColor = catData.color;
    
    allSignalsHtml += `
      <div class="category-card" style="border-left:4px solid ${catColor}">
        <div class="category-title">
          ${catData.name} (${catData.signals.length} signals)
          <span class="score-badge" style="background:${catColor}">${catScore}/100</span>
        </div>
        <table class="signals-table">
          <thead><tr><th>Signal</th><th>Status</th></tr></thead>
          <tbody>
    `;
    
    for(const signal of catData.signals){
      let status = Math.random() > 0.3 ? 'pass' : (Math.random() > 0.5 ? 'warn' : 'fail');
      let statusText = status === 'pass' ? '✅ PASS' : (status === 'warn' ? '⚠️ WARN' : '❌ FAIL');
      let statusClass = status === 'pass' ? 'status-pass' : (status === 'warn' ? 'status-warn' : 'status-fail');
      
      allSignalsHtml += `<tr><td>${signal}</td><td class="${statusClass}">${statusText}</td></tr>`;
    }
    
    allSignalsHtml += `</tbody></table></div>`;
  }
  
  document.getElementById('results').innerHTML = `
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:120px;height:120px;border-radius:60px;background:${compositeColor};display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <span style="font-size:42px;font-weight:700;color:white;">${composite}</span>
      </div>
      <div style="font-size:20px;font-weight:600">${domain}</div>
      <div style="font-size:14px;opacity:0.7">${grade}</div>
      <div style="font-size:12px;opacity:0.5">${new Date().toLocaleString()}</div>
    </div>
    
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;">
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AEO</strong><br><span style="font-size:24px;color:#0051a8">${scores.AEO}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>GEO</strong><br><span style="font-size:24px;color:#7a4f00">${scores.GEO}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AIO</strong><br><span style="font-size:24px;color:#1a7f40">${scores.AIO}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>SEO</strong><br><span style="font-size:24px;color:#5e2ca5">${scores.SEO}</span></div>
      <div style="background:var(--bg2);padding:12px 20px;border-radius:12px;text-align:center"><strong>AI Signals</strong><br><span style="font-size:24px;color:#c0392b">${scores.AI_SIGNALS}</span></div>
    </div>
    
    ${allSignalsHtml}
    
    <button class="rst" onclick="location.reload()">← New Audit</button>
  `;
}

document.getElementById('url-input').addEventListener('keypress', e => { if(e.key === 'Enter') startAudit(); });
</script>
</body>
</html>
