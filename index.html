<!DOCTYPE html>
<html>
<head>
<title>API TEST</title>
<style>
body{font-family:monospace;padding:20px}
input{padding:10px;width:300px}
button{padding:10px}
pre{background:#f0f0f0;padding:20px;margin-top:20px}
</style>
</head>
<body>
<h1>Claude API Test</h1>
<input type="text" id="url" placeholder="example.com">
<button onclick="testAPI()">Call API</button>
<pre id="result">Result will appear here</pre>

<script>
async function testAPI() {
  const url = document.getElementById('url').value;
  document.getElementById('result').innerText = 'Calling /api/audit...';
  
  const res = await fetch('/api/audit', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({url: url})
  });
  
  const text = await res.text();
  document.getElementById('result').innerText = text;
}
</script>
</body>
</html>
