<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIT-AI™ — REAL 5-Category AI Audit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#ffffff;color:#000000;line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:40px 24px}
h1{font-size:32px;margin-bottom:8px}
h1 span{color:#0051a8}
.sub{color:#666;margin-bottom:32px}
.input-group{display:flex;gap:12px;margin-bottom:40px}
input{flex:1;padding:14px 20px;font-size:16px;border:2px solid #e0e0e0;border-radius:60px;outline:none}
input:focus{border-color:#0051a8}
button{padding:14px 32px;background:#0051a8;color:white;border:none;border-radius:60px;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:40px;display:none}
.results{display:none}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px}
.score-card{background:#f5f5f7;border-radius:16px;padding:20px;text-align:center}
.score-card h3{font-size:14px;margin-bottom:8px;color:#666}
.score-number{font-size:36px;font-weight:700}
.composite-card{background:#0051a8;color:white;border-radius:16px;padding:24px;text-align:center;margin-bottom:32px}
.composite-number{font-size:64px;font-weight:700}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.file-item{padding:12px;background:#f5f5f7;border-radius:12px}
.file-name{font-weight:600;margin-bottom:4px}
.status-ok{color:#1a7f40}
.status-missing{color:#c0392b}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Audit<span>·AI™</span></h1>
  <div class="sub">REAL 5-Category AI Visibility Audit · AEO · GEO · AIO · SEO · AI Signals</div>
  
  <div class="input-group">
    <input type="text" id="domain" placeholder="example.com" value="5thelement.ai">
    <button id="runBtn">Run REAL Audit</button>
  </div>
  
  <div id="loading" class="loading">🔍 Scanning 5thelement.ai for AI signals...</div>
  <div id="results" class="results"></div>
</div>

<script>
const WORKER = 'https://audit-worker.aipath512.workers.dev';

async function runAudit() {
  const domain = document.getElementById('domain').value.trim();
  if (!domain) return;
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('runBtn').disabled = true;
  
  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: 'https://' + domain })
    });
    
    const data = await res.json();
    displayResults(data);
  } catch (err) {
    document.getElementById('results').innerHTML = `<div style="color:red;padding:20px">Error: ${err.message}</div>`;
    document.getElementById('results').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('runBtn').disabled = false;
  }
}

function displayResults(data) {
  const scores = data.scores || {};
  
  // Color based on score
  const getColor = (score) => {
    if (score >= 80) return '#1a7f40';
    if (score >= 60) return '#7a4f00';
    return '#c0392b';
  };
  
  let scoresHtml = `
    <div class="score-grid">
      <div class="score-card"><h3>AEO</h3><div class="score-number" style="color:${getColor(scores.AEO)}">${scores.AEO || 0}</div><div style="font-size:12px">Answer Engine</div></div>
      <div class="score-card"><h3>GEO</h3><div class="score-number" style="color:${getColor(scores.GEO)}">${scores.GEO || 0}</div><div style="font-size:12px">Generative Engine</div></div>
      <div class="score-card"><h3>AIO</h3><div class="score-number" style="color:${getColor(scores.AIO)}">${scores.AIO || 0}</div><div style="font-size:12px">AI Optimization</div></div>
      <div class="score-card"><h3>SEO</h3><div class="score-number" style="color:${getColor(scores.SEO)}">${scores.SEO || 0}</div><div style="font-size:12px">Search Engine</div></div>
      <div class="score-card"><h3>AI Signals</h3><div class="score-number" style="color:${getColor(scores.AI_SIGNALS)}">${scores.AI_SIGNALS || 0}</div><div style="font-size:12px">Trust Layer</div></div>
    </div>
    <div class="composite-card">
      <div>COMPOSITE SCORE</div>
      <div class="composite-number">${scores.COMPOSITE || 0}</div>
      <div>${data.grade || ''}</div>
    </div>
  `;
  
  let filesHtml = '<div class="files-grid">';
  const files = data.files || {};
  for (const [name, exists] of Object.entries(files)) {
    filesHtml += `
      <div class="file-item">
        <div class="file-name">${name}</div>
        <div class="${exists ? 'status-ok' : 'status-missing'}">${exists ? '✅ FOUND' : '❌ MISSING'}</div>
      </div>
    `;
  }
  filesHtml += '</div>';
  
  document.getElementById('results').innerHTML = `
    ${scoresHtml}
    <div style="background:#f5f5f7;border-radius:16px;padding:20px;margin-top:20px">
      <h3 style="margin-bottom:16px">📁 Critical AI Files Detected</h3>
      ${filesHtml}
    </div>
    <div style="margin-top:20px;font-size:12px;color:#666;text-align:center">
      ✅ REAL checks performed via Cloudflare Worker | ${new Date().toLocaleString()}
    </div>
  `;
  document.getElementById('results').style.display = 'block';
}

document.getElementById('runBtn').onclick = runAudit;
document.getElementById('domain').onkeypress = (e) => { if (e.key === 'Enter') runAudit(); };
runAudit();
</script>
</body>
</html>
